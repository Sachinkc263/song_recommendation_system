services:
  - type: web
    name: spotify-rec-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/download_data.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
