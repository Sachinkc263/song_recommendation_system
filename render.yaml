services:
  - type: web
    name: spotify-rec-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/download_data.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Set in the Render dashboard (Environment tab):
      - key: ALLOWED_ORIGINS   # deployed frontend origin(s), comma-separated
        sync: false
      - key: HF_TOKEN          # Hugging Face read token — faster data downloads
        sync: false
